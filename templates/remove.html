{% extends 'index.html' %}

{% block body %}
    <h3>Remove a Car</h3>
    <form action="/remove" post="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="car" class="form-label">Car</label>
            <input type="select" class="form-control" name="car">
        </div>
        <button type="submit" class="btn btn-primary">Remove Ride</button>
    </form>
        
{% endblock %}
