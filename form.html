{% extends 'index.html' %}

{% block body %}
    <h3>Enter a Video Game Character</h3>
    <form method = "post" action="/">
        <p>Character Name</p>
        <input type="text" name="character" required>
        <br><br>
        <p>Video Game</p>
        <input type="text" name="game" required>
        <br><br>
        <input type="submit" value="Submit">
    </form>

{% endblock %}
